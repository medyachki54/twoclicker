name: Build and Release APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    # 1. Скачиваем код твоего репозитория
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Используем специальный модуль для стабильной работы Buildozer на GitHub
    - name: Build with Buildozer
      uses: ArtemSBulgakov/buildozer-action@v1
      id: buildozer
      with:
        command: buildozer android debug
        buildozer_version: master

    # 3. Создаем релиз и загружаем туда готовый APK
    - name: Upload APK to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        files: bin/*.apk
        tag_name: v3.0-${{ github.run_number }}
        name: Релиз версии 3.0 (Сборка #${{ github.run_number }})
        body: |
          Автоматическая сборка кликера.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
