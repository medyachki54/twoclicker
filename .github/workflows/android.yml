name: Build and Release APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    # ❗ КРИТИЧЕСКОЕ ИСПРАВЛЕНИЕ: Выдаем права на запись для создания релизов
    permissions:
      contents: write

    steps:
    - name: 1. Скачиваем код
      uses: actions/checkout@v4

    - name: 2. Устанавливаем Java 17 (Критически важно для Android SDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 3. Устанавливаем Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 4. Устанавливаем системные библиотеки
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

    - name: 5. Устанавливаем Buildozer и Cython
      run: |
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: 6. Собираем APK (Принудительно принимаем лицензии)
      run: |
        yes | buildozer -v android debug

    - name: 7. Загружаем готовый APK в Релизы GitHub
      uses: softprops/action-gh-release@v2
      with:
        files: bin/*.apk
        tag_name: v3.0-${{ github.run_number }}
        name: Кликер (Сборка #${{ github.run_number }})
        body: "Стабильная сборка без ошибок. Готово к установке."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
